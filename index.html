<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널 팔로워 성장세</title>
<style>
  :root{
    --bg:#0b0f17; --panel:#121826; --panel2:#0e1420;
    --grid:#1c2533; --txt:#e5e7eb; --muted:#9aa4b2; --ring:#1f2a3a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:radial-gradient(1200px 600px at 70% -10%, #16203a 0%, var(--bg) 55%);
    color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",Roboto,sans-serif;
    min-height:100vh; padding:32px 20px;
  }
  .wrap{max-width:1080px; margin:0 auto;}
  header{margin-bottom:22px;}
  h1{font-size:24px; font-weight:700; margin:0 0 6px; letter-spacing:-.3px;}
  .sub{color:var(--muted); font-size:13px; line-height:1.6;}
  .card{
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
    border:1px solid var(--ring); border-radius:18px; padding:22px 22px 14px;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .toprow{display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .legend{display:flex; flex-wrap:wrap; gap:9px;}
  .chip{
    display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
    background:#0c1220; border:1px solid var(--ring); border-radius:999px;
    padding:7px 13px 7px 10px; font-size:13px; transition:.18s; line-height:1;
  }
  .chip:hover{border-color:#33415a; transform:translateY(-1px);}
  .chip.off{opacity:.36; filter:grayscale(.6);}
  .dot{width:11px; height:11px; border-radius:50%; flex:none;}
  .chip .ko{color:var(--muted); font-size:11px;}
  .chip .delta{color:#34d399; font-size:11px; font-weight:600; margin-left:1px; font-variant-numeric:tabular-nums;}
  .toggle{display:flex; background:#0c1220; border:1px solid var(--ring); border-radius:999px; padding:3px;}
  .toggle button{
    border:0; background:transparent; color:var(--muted); font:inherit; font-size:12px; font-weight:600;
    padding:7px 14px; border-radius:999px; cursor:pointer; transition:.15s;
  }
  .toggle button.active{background:#1d2942; color:#fff;}
  .chartbox{position:relative;}
  svg{width:100%; height:auto; display:block; overflow:visible;}
  .gridline{stroke:var(--grid); stroke-width:1;}
  .baseline{stroke:#3a4866; stroke-width:1; stroke-dasharray:3 4;}
  .axis-txt{fill:var(--muted); font-size:11px;}
  .anno{fill:#6b7689; font-size:10px;}
  .series-path{fill:none; stroke-width:2.6; transition:opacity .2s; filter:drop-shadow(0 5px 12px rgba(0,0,0,.45));}
  .series-area{transition:opacity .2s;}
  .pt{transition:r .12s, opacity .2s;}
  .hover-line{stroke:#3b4760; stroke-width:1; stroke-dasharray:4 4;}
  .tooltip{
    position:absolute; pointer-events:none; opacity:0; transform:translate(-50%,-115%);
    background:#0a0e16; border:1px solid #2a3650; border-radius:12px; padding:11px 13px;
    font-size:12px; min-width:200px; box-shadow:0 12px 30px rgba(0,0,0,.55); transition:opacity .12s; z-index:5;
  }
  .tooltip .tt-date{color:var(--muted); font-size:11px; margin-bottom:8px;}
  .tt-row{display:flex; align-items:center; gap:10px; margin:4px 0; justify-content:space-between;}
  .tt-row .l{display:flex; align-items:center; gap:7px;}
  .tt-row .v{font-variant-numeric:tabular-nums; font-weight:600;}
  .tt-row .v small{color:var(--muted); font-weight:400; margin-left:4px;}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-top:18px;}
  .stat{background:#0c1220; border:1px solid var(--ring); border-radius:14px; padding:14px;}
  .stat .name{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:9px;}
  .stat .big{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums;}
  .stat .grow{font-size:12px; margin-top:4px; font-variant-numeric:tabular-nums;}
  .up{color:#34d399;} .down{color:#f87171;}
  footer{color:var(--muted); font-size:11px; text-align:center; margin-top:18px;}
  .section-h{font-size:18px; font-weight:700; margin:34px 2px 4px; letter-spacing:-.3px;}
  .mini-card{
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
    border:1px solid var(--ring); border-radius:16px; padding:18px 18px 8px; margin-bottom:16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4);
  }
  .mini-head{display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:10px; flex-wrap:wrap;}
  .mini-head .t{font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .mini-head .badge{font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px; background:#1b2538; color:#9fb2d4; letter-spacing:.3px;}
  .mini-head .s{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}
  .mini-legend{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:2px;}
  .mini-legend span{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📈 채널별 팔로워 성장세</h1>
    <div class="sub">5/27 키우기 시작 → 6/23 현재 · 범례 클릭으로 채널 on/off · 그래프 위에 마우스를 올리면 날짜별 수치가 보입니다</div>
  </header>

  <div class="card">
    <div class="toprow">
      <div class="legend" id="legend"></div>
      <div class="toggle" id="toggle">
        <button data-mode="pct" class="active">성장률 %</button>
        <button data-mode="abs">실제 팔로워</button>
      </div>
    </div>
    <div class="chartbox" id="chartbox">
      <svg id="chart" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <h2 class="section-h">📊 실제 팔로워 추이 · 규모별</h2>
  <div class="sub" style="margin:-4px 2px 14px;">규모가 다른 채널을 한 표에 그리면 성장이 묻히기 때문에, 척도를 분리해 각 채널의 실제 기울기를 살렸습니다</div>
  <div id="multiples"></div>

  <footer>shorts-publisher · 단위: 만명 · 천단위 이하 절삭</footer>
</div>

<script>
/* 단위: 만명. 날짜 간격이 다르므로 x축은 5/27 기준 경과일에 비례 */
const DATA = {
  dates: ["5/27","5/30","6/2","6/4","6/5","6/9","6/10","6/12","6/15","6/16","6/17","6/18","6/19","6/23"],
  days:  [0,     3,     6,    8,    9,    13,   14,    16,    19,    20,    21,    22,    23,    27],
  channels: [
    { handle:"goodvibesongs", ko:"굿바이브", color:"#60a5fa", data:[18, 18.3,18.5,18.6,18.8,19.3,19.4,19.5,19.7,19.9,20,  20.1,20.4,20.9] },
    { handle:"goodmovies",    ko:"굿무비",   color:"#f472b6", data:[8.5,8.7, 8.8, 8.8, 8.9, 9.1, 9.2, 9.2, 9.4, 9.4, 9.4, 9.5, 9.5, 9.8] },
    { handle:"thishiphop",    ko:"디스힙합", color:"#fbbf24", data:[7,  7.2, 7.3, 7.3, 7.6, 7.8, 7.9, 7.9, 8,   8,   8,   8,   8.1, 8.2] },
    { handle:"readyaction",   ko:"레디액션", color:"#34d399", data:[6.8,7.1, 7.5, 7.7, 7.8, 8.1, 8.2, 8.3, 8.4, 8.4, 8.5, 8.5, 8.6, 8.8] },
    { handle:"space_lab",     ko:"스페이스랩",color:"#a78bfa", data:[2,  2.2, 2.3, 2.3, 2.3, 2.4, 2.4, 2.4, 2.4, 2.4, 2.4, 2.4, 2.4, 2.5] },
  ]
};

const W=900,H=560, M={t:30,r:30,b:46,l:58};
const iw=W-M.l-M.r, ih=H-M.t-M.b;
const NS="http://www.w3.org/2000/svg";
const svg=document.getElementById('chart');
const tooltip=document.getElementById('tooltip');
const n=DATA.dates.length;
const maxDay=DATA.days[n-1];
const state={}; DATA.channels.forEach(c=>state[c.handle]=true);
let MODE='pct';   // 'pct' | 'abs'

const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const manwon=v=>(Math.round(v*100)/100)+'만명';
const pctOf=(c,i)=>(c.data[i]/c.data[0]-1)*100;
const sign=x=>(x>=0?'+':'');

// y-domain per mode
function yDomain(){
  if(MODE==='pct'){
    let mx=0;
    DATA.channels.forEach(c=>{if(state[c.handle])c.data.forEach((v,i)=>mx=Math.max(mx,pctOf(c,i)));});
    mx=Math.max(mx,5);
    const top=Math.ceil(mx/5)*5;
    return {min:0, max:top};
  }else{
    let mn=Infinity,mx=-Infinity;
    DATA.channels.forEach(c=>{if(state[c.handle])c.data.forEach(v=>{mn=Math.min(mn,v);mx=Math.max(mx,v);});});
    if(!isFinite(mn)){mn=0;mx=1;}
    const pad=Math.max((mx-mn)*0.08,0.2);
    // 0.5 단위로 다듬어 위아래를 꽉 채움
    const lo=Math.floor((mn-pad)*2)/2, hi=Math.ceil((mx+pad)*2)/2;
    return {min:lo, max:hi};
  }
}
let DOM=yDomain();
const X=i=>M.l+(maxDay?iw*DATA.days[i]/maxDay:iw/2);
const yv=(c,i)=>MODE==='pct'?pctOf(c,i):c.data[i];
const Y=v=>M.t+ih-((v-DOM.min)/(DOM.max-DOM.min))*ih;

function smooth(pts){
  if(pts.length<2)return pts.length?`M${pts[0][0]},${pts[0][1]}`:"";
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${c1x},${c1y} ${c2x},${c2y} ${p2[0]},${p2[1]}`;
  }
  return d;
}

let hoverLine, hoverDots;
function render(){
  DOM=yDomain();
  svg.innerHTML="";
  const ticks=5;
  for(let i=0;i<=ticks;i++){
    const val=DOM.min+(DOM.max-DOM.min)*i/ticks, y=Y(val);
    svg.appendChild(el('line',{class:'gridline',x1:M.l,y1:y,x2:W-M.r,y2:y}));
    const t=el('text',{class:'axis-txt',x:M.l-10,y:y+4,'text-anchor':'end'});
    t.textContent=MODE==='pct'?(sign(val)+Math.round(val)+'%'):((Math.round(val*10)/10)+'만');
    svg.appendChild(t);
  }
  // x labels (간격 좁은 날짜는 겹치지 않게 솎아냄, 마지막은 항상 표시)
  let lastX=-99;
  DATA.dates.forEach((d,i)=>{
    const x=X(i), isLast=i===n-1;
    if(x-lastX>=40 || isLast){
      if(isLast && x-lastX<40){/* 마지막 라벨 자리 확보 */}
      const t=el('text',{class:'axis-txt',x:x,y:H-M.b+22,'text-anchor':'middle'});t.textContent=d;svg.appendChild(t);
      lastX=x;
    }
  });
  // baseline annotation
  const bx=X(0);
  svg.appendChild(el('line',{class:'baseline',x1:bx,y1:M.t,x2:bx,y2:M.t+ih}));
  const a=el('text',{class:'anno',x:bx+5,y:M.t+12});a.textContent='키우기 시작';svg.appendChild(a);

  const defs=el('defs',{});
  DATA.channels.forEach((c,i)=>{
    const g=el('linearGradient',{id:'g'+i,x1:0,y1:0,x2:0,y2:1});
    g.appendChild(el('stop',{offset:'0%','stop-color':c.color,'stop-opacity':'.26'}));
    g.appendChild(el('stop',{offset:'100%','stop-color':c.color,'stop-opacity':'0'}));
    defs.appendChild(g);
  });
  svg.appendChild(defs);

  DATA.channels.forEach((c,i)=>{
    const on=state[c.handle];
    const pts=c.data.map((v,j)=>[X(j),Y(yv(c,j))]);
    const base=Y(DOM.min);
    svg.appendChild(el('path',{class:'series-area',d:smooth(pts)+` L${X(n-1)},${base} L${X(0)},${base} Z`,fill:'url(#g'+i+')',opacity:on?1:0}));
    svg.appendChild(el('path',{class:'series-path',d:smooth(pts),stroke:c.color,opacity:on?1:.05}));
    pts.forEach(p=>svg.appendChild(el('circle',{class:'pt',cx:p[0],cy:p[1],r:3,fill:'#0b0f17',stroke:c.color,'stroke-width':2,opacity:on?1:0})));
  });

  hoverLine=el('line',{class:'hover-line',x1:0,y1:M.t,x2:0,y2:M.t+ih,opacity:0});svg.appendChild(hoverLine);
  hoverDots=DATA.channels.map(c=>{const d=el('circle',{cx:0,cy:0,r:5,fill:c.color,stroke:'#0b0f17','stroke-width':2,opacity:0});svg.appendChild(d);return d;});
}

svg.addEventListener('mousemove',e=>{
  const r=svg.getBoundingClientRect();
  const sx=(e.clientX-r.left)/r.width*W;
  // nearest index by x pixel (날짜 간격 비균등)
  let i=0,best=1e9;
  for(let k=0;k<n;k++){const d=Math.abs(X(k)-sx);if(d<best){best=d;i=k;}}
  const px=X(i);
  hoverLine.setAttribute('x1',px);hoverLine.setAttribute('x2',px);hoverLine.setAttribute('opacity',1);
  let rows='';
  DATA.channels.forEach((c,k)=>{
    if(state[c.handle]){
      hoverDots[k].setAttribute('cx',px);hoverDots[k].setAttribute('cy',Y(yv(c,i)));hoverDots[k].setAttribute('opacity',1);
      const p=pctOf(c,i);
      const val= MODE==='pct'
        ? `<span class="up">${sign(p)}${p.toFixed(1)}%</span><small>${manwon(c.data[i])}</small>`
        : `${manwon(c.data[i])}<small>${sign(p)}${p.toFixed(1)}%</small>`;
      rows+=`<div class="tt-row"><span class="l"><span class="dot" style="background:${c.color}"></span>${c.ko}</span><span class="v">${val}</span></div>`;
    }else hoverDots[k].setAttribute('opacity',0);
  });
  tooltip.innerHTML=`<div class="tt-date">${DATA.dates[i]}</div>${rows}`;
  tooltip.style.left=(px/W*r.width)+'px';
  tooltip.style.top=(M.t/H*r.height)+'px';
  tooltip.style.opacity=1;
});
svg.addEventListener('mouseleave',()=>{
  tooltip.style.opacity=0;hoverLine.setAttribute('opacity',0);hoverDots.forEach(d=>d.setAttribute('opacity',0));
});

// legend
const legend=document.getElementById('legend');
DATA.channels.forEach(c=>{
  const pct=pctOf(c,n-1);
  const chip=document.createElement('div');chip.className='chip';
  chip.innerHTML=`<span class="dot" style="background:${c.color}"></span><b>${c.handle}</b><span class="ko">${c.ko}</span><span class="delta">${sign(pct)}${pct.toFixed(1)}%</span>`;
  chip.onclick=()=>{state[c.handle]=!state[c.handle];chip.classList.toggle('off',!state[c.handle]);render();};
  legend.appendChild(chip);
});

// stat cards
const stats=document.getElementById('stats');
function buildStats(){
  stats.innerHTML='';
  DATA.channels.forEach(c=>{
    const first=c.data[0],last=c.data[n-1],diff=Math.round((last-first)*100)/100,pct=pctOf(c,n-1);
    const cls=diff>=0?'up':'down';
    const card=document.createElement('div');card.className='stat';
    card.innerHTML=`<div class="name"><span class="dot" style="background:${c.color}"></span>${c.handle} · ${c.ko}</div>
      <div class="big">${manwon(last)}</div>
      <div class="grow ${cls}">${sign(diff)}${diff}만 (${sign(pct)}${pct.toFixed(1)}%)</div>`;
    stats.appendChild(card);
  });
}

// mode toggle
document.getElementById('toggle').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  MODE=b.dataset.mode;
  [...document.querySelectorAll('#toggle button')].forEach(x=>x.classList.toggle('active',x===b));
  render();
});

buildStats();
render();

/* ===== 규모별 분리 미니차트 ===== */
const GROUPS=[
  {title:'고팔로워 채널', badge:'HIGH',   handles:['goodvibesongs']},
  {title:'일반 채널들',   badge:'NORMAL', handles:['goodmovies','thishiphop','readyaction']},
  {title:'저팔로워 채널', badge:'LOW',    handles:['space_lab']},
];
const multi=document.getElementById('multiples');

function buildMini(group){
  const chans=group.handles.map(h=>DATA.channels.find(c=>c.handle===h));
  const W2=900,H2=300,Mm={t:24,r:26,b:40,l:58};
  const iw2=W2-Mm.l-Mm.r, ih2=H2-Mm.t-Mm.b;
  let mn=Infinity,mx=-Infinity;
  chans.forEach(c=>c.data.forEach(v=>{mn=Math.min(mn,v);mx=Math.max(mx,v);}));
  const pad=Math.max((mx-mn)*0.12,0.12);
  const lo=Math.floor((mn-pad)*10)/10, hi=Math.ceil((mx+pad)*10)/10;
  const Xx=i=>Mm.l+(maxDay?iw2*DATA.days[i]/maxDay:iw2/2);
  const Yy=v=>Mm.t+ih2-((v-lo)/(hi-lo))*ih2;

  // card shell
  const card=document.createElement('div');card.className='mini-card';
  const last=chans.map(c=>c.data[n-1]);
  const rng=chans.length>1?`${Math.min(...last)}~${Math.max(...last)}만명`:`${last[0]}만명`;
  let legendHtml='';
  if(chans.length>1) legendHtml='<div class="mini-legend">'+chans.map(c=>`<span><span class="dot" style="background:${c.color}"></span>${c.handle} · ${c.ko}</span>`).join('')+'</div>';
  card.innerHTML=`<div class="mini-head"><div class="t"><span class="badge">${group.badge}</span>${group.title}</div><div class="s">현재 ${rng}</div></div>${legendHtml}
    <div class="chartbox"><svg viewBox="0 0 ${W2} ${H2}" preserveAspectRatio="xMidYMid meet"></svg><div class="tooltip"></div></div>`;
  multi.appendChild(card);

  const s=card.querySelector('svg'), tip=card.querySelector('.tooltip');

  // gridlines + y labels
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const val=lo+(hi-lo)*i/ticks, y=Yy(val);
    s.appendChild(el('line',{class:'gridline',x1:Mm.l,y1:y,x2:W2-Mm.r,y2:y}));
    const t=el('text',{class:'axis-txt',x:Mm.l-10,y:y+4,'text-anchor':'end'});t.textContent=(Math.round(val*10)/10)+'만';s.appendChild(t);
  }
  // x labels (thinning)
  let lastX=-99;
  DATA.dates.forEach((d,i)=>{const x=Xx(i);if(x-lastX>=40||i===n-1){const t=el('text',{class:'axis-txt',x:x,y:H2-Mm.b+22,'text-anchor':'middle'});t.textContent=d;s.appendChild(t);lastX=x;}});
  // baseline
  const bx=Xx(0);
  s.appendChild(el('line',{class:'baseline',x1:bx,y1:Mm.t,x2:bx,y2:Mm.t+ih2}));
  const an=el('text',{class:'anno',x:bx+5,y:Mm.t+12});an.textContent='시작';s.appendChild(an);
  // gradients + series
  const defs=el('defs',{});
  chans.forEach((c,i)=>{const g=el('linearGradient',{id:group.badge+'g'+i,x1:0,y1:0,x2:0,y2:1});
    g.appendChild(el('stop',{offset:'0%','stop-color':c.color,'stop-opacity':'.30'}));
    g.appendChild(el('stop',{offset:'100%','stop-color':c.color,'stop-opacity':'0'}));defs.appendChild(g);});
  s.appendChild(defs);
  const baseY=Yy(lo);
  chans.forEach((c,i)=>{
    const pts=c.data.map((v,j)=>[Xx(j),Yy(v)]);
    s.appendChild(el('path',{class:'series-area',d:smooth(pts)+` L${Xx(n-1)},${baseY} L${Xx(0)},${baseY} Z`,fill:`url(#${group.badge}g${i})`}));
    s.appendChild(el('path',{class:'series-path',d:smooth(pts),stroke:c.color}));
    pts.forEach(p=>s.appendChild(el('circle',{class:'pt',cx:p[0],cy:p[1],r:3,fill:'#0b0f17',stroke:c.color,'stroke-width':2})));
  });
  // hover
  const hl=el('line',{class:'hover-line',x1:0,y1:Mm.t,x2:0,y2:Mm.t+ih2,opacity:0});s.appendChild(hl);
  const hd=chans.map(c=>{const d=el('circle',{cx:0,cy:0,r:5,fill:c.color,stroke:'#0b0f17','stroke-width':2,opacity:0});s.appendChild(d);return d;});
  s.addEventListener('mousemove',e=>{
    const r=s.getBoundingClientRect(), sx=(e.clientX-r.left)/r.width*W2;
    let idx=0,best=1e9;for(let k=0;k<n;k++){const dd=Math.abs(Xx(k)-sx);if(dd<best){best=dd;idx=k;}}
    const px=Xx(idx);hl.setAttribute('x1',px);hl.setAttribute('x2',px);hl.setAttribute('opacity',1);
    let rows='';
    chans.forEach((c,k)=>{hd[k].setAttribute('cx',px);hd[k].setAttribute('cy',Yy(c.data[idx]));hd[k].setAttribute('opacity',1);
      const p=pctOf(c,idx);
      rows+=`<div class="tt-row"><span class="l"><span class="dot" style="background:${c.color}"></span>${c.ko}</span><span class="v">${manwon(c.data[idx])}<small>${sign(p)}${p.toFixed(1)}%</small></span></div>`;});
    tip.innerHTML=`<div class="tt-date">${DATA.dates[idx]}</div>${rows}`;
    tip.style.left=(px/W2*r.width)+'px';tip.style.top=(Mm.t/H2*r.height)+'px';tip.style.opacity=1;
  });
  s.addEventListener('mouseleave',()=>{tip.style.opacity=0;hl.setAttribute('opacity',0);hd.forEach(d=>d.setAttribute('opacity',0));});
}
GROUPS.forEach(buildMini);

/* ===== 스크롤 진입 시 선 그리기 애니메이션 (한 번만) ===== */
function drawReveal(svg){
  if(!svg||svg.dataset.revealed)return; svg.dataset.revealed='1';
  svg.querySelectorAll('.series-path').forEach((p,i)=>{
    let len; try{len=p.getTotalLength();}catch(e){return;}
    p.style.transition='none';
    p.style.strokeDasharray=len; p.style.strokeDashoffset=len;
    p.getBoundingClientRect(); // reflow → 시작 상태 고정
    p.style.transition=`stroke-dashoffset 1.15s cubic-bezier(.4,0,.2,1) ${i*0.14}s`;
    p.style.strokeDashoffset='0';
  });
  svg.querySelectorAll('.series-area').forEach(a=>{
    const to=a.getAttribute('opacity')||'1';
    a.style.opacity='0'; a.style.transition='opacity 1s ease .45s';
    requestAnimationFrame(()=>{a.style.opacity=to;});
  });
  svg.querySelectorAll('.pt').forEach((c,i)=>{
    const to=c.getAttribute('opacity')||'1'; c.style.opacity='0';
    c.style.transition='opacity .35s ease';
    setTimeout(()=>{c.style.opacity=to;}, 350+i*12);
  });
}
const io=new IntersectionObserver((entries)=>{
  entries.forEach(en=>{ if(en.isIntersecting){ drawReveal(en.target.querySelector('svg')); io.unobserve(en.target); } });
},{threshold:0.2});
document.querySelectorAll('.card, .mini-card').forEach(c=>io.observe(c));
</script>
