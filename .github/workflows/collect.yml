name: Collect followers

on:
  schedule:
    # 정시(:00)는 GitHub 부하 피크라 지연·드롭이 잦아 :07/:37로 분산 (둘 다 떠도 같은 날짜 덮어쓰기라 무해)
    - cron: '7 1 * * *'    # 10:07 KST
    - cron: '37 1 * * *'   # 10:37 KST (1차 드롭 대비 백업)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write channels.json from secret
        run: printf '%s' "$CHANNELS_JSON" > channels.json
        env:
          CHANNELS_JSON: ${{ secrets.CHANNELS_JSON }}

      - name: Collect followers
        run: node collect.mjs

      - name: Commit data.json if changed
        run: |
          rm -f channels.json
          if git diff --quiet -- data.json; then
            echo "변경 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: 팔로워 자동 수집 ($(date -u +%Y-%m-%d))"
            git push
          fi
